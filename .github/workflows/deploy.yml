name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Daily rebuild so the version badge picks up new Prunerr releases even if
    # nobody pushes to this repo. UTC.
    - cron: '17 6 * * *'
  repository_dispatch:
    types: [prunerr-release]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          # When DNS is pointed at prunerr.app, change SITE_URL/BASE_PATH:
          #   SITE_URL=https://prunerr.app  BASE_PATH=/
          SITE_URL: https://helliott20.github.io
          BASE_PATH: /prunerr-website/
          # Authenticated GitHub API requests get 5,000/hr instead of 60/hr —
          # belt-and-braces in case the daily cron lands during a rate-limit dip.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
